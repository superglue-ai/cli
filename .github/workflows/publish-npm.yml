name: Publish to npm

on:
  push:
    branches:
      - main

jobs:
  publish:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          registry-url: 'https://registry.npmjs.org'

      - name: Install production dependencies
        run: npm install --ignore-scripts

      - name: Verify dist exists
        run: |
          if [ ! -d "dist" ] || [ ! -f "dist/cli.js" ]; then
            echo "ERROR: dist/ folder is missing or incomplete. The sync workflow should have committed it."
            exit 1
          fi

      - name: Determine publish version
        run: |
          CURRENT_NPM=$(npm view @superglue/cli version 2>/dev/null || echo "0.0.0")
          PKG_VERSION=$(node -p "require('./package.json').version")
          PKG_MAJOR_MINOR=$(echo "$PKG_VERSION" | cut -d. -f1-2)
          NPM_MAJOR_MINOR=$(echo "$CURRENT_NPM" | cut -d. -f1-2)
          if [ "$PKG_MAJOR_MINOR" != "$NPM_MAJOR_MINOR" ]; then
            PUBLISH_VERSION="$PKG_VERSION"
          else
            NPM_PATCH=$(echo "$CURRENT_NPM" | cut -d. -f3)
            PUBLISH_VERSION="${PKG_MAJOR_MINOR}.$((NPM_PATCH + 1))"
          fi
          echo "Publishing as ${PUBLISH_VERSION} (npm current: ${CURRENT_NPM}, package.json: ${PKG_VERSION})"
          npm version "${PUBLISH_VERSION}" --no-git-tag-version --allow-same-version

      - name: Publish to npm
        run: npm publish --access public --ignore-scripts
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
